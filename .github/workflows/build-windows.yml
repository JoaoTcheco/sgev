name: Build Windows Installers

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "electron/**"
      - "src/**"
      - "package.json"
      - "vite.electron.config.ts"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --ignore-scripts
        env:
          npm_config_build_from_source: "false"

      - name: Build better-sqlite3 from source
        run: npx --yes node-gyp@10 rebuild --release
        working-directory: node_modules/better-sqlite3

      - name: Build SPA bundle
        run: npm run electron:build

      - name: Package Windows installers (NSIS + MSI)
        run: npx electron-builder --win nsis msi --x64 --publish never
        env:
          GH_TOKEN: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem dist-electron -Recurse -Include *.exe,*.msi,*.blockmap | Select-Object FullName,Length

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: pharmasys-windows-installers
          path: |
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
